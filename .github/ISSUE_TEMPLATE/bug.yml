name: 🐛 Bug Report
description: Something is broken
type: Bug
labels: ["needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: One sentence describing the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / Commit SHA
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: 
        - Runtime/Browser: 
        - Relevant config:
    validations:
      required: true
